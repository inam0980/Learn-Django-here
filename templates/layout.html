<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InamShop</title>
    <style>
        html {
            overflow-y: scroll;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            color: #333;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background-color: #4CAF50;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }

        .card {
            display: inline-block;
            vertical-align: top;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            margin: 10px;
            width: 260px;
            height: 230px;
            overflow: hidden;
        }

        .card img {
            width: 150px;
            height: 150px;
            object-fit: cover;
        }

        footer {
            text-align: center;
            margin: 20px;
        }

        footer .details-box {
            background-color: #4CAF50;
            color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <header>
        <h1>InamShop</h1>
        <nav>
            <a href="{% url 'home' %}">Home</a>
        </nav>
    </header>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <div class="details-box">
            <p>Owner: Inam Khan</p>
            <p>Contact: 8292931569</p>
            <p>Email: inampathan0000@gmail.com</p>
        </div>
    </footer>
</body>
</html>
