{% extends 'layout.html' %}

{% block content %}
    <h2>Clothes</h2>

    {% for i in kapda %}
        <div class="card">
            <img src="{{ i.image.url }}" alt="{{ i.description }}">
            <p><strong>{{ i.name }}</strong></p>
            <p>{{ i.description }}</p>
            <p>Size: {{ i.size }}</p>
        </div>
    {% empty %}
        <p>No clothes available.</p>
    {% endfor %}
{% endblock %}
